# RK3588 AimBot 配置文件
# 路径: /home/ztl/github/RK/config.ini

[device]
# HDMI 捕获设备
device = /dev/video40
width = 1920
height = 1080

[model]
# YOLO 模型路径
model = /home/ztl/github/RK/src/yolov8n-pose.rknn

[aim]
# 瞄准功能配置
enabled = true
preset = LEGIT          # LEGIT, SEMI_RAGE, RAGE
sensitivity = 1.0     # 灵敏度倍数 (0.1 - 3.0)

[hid]
# HID 转发配置
# 注意：留空会自动探测设备
keyboard_device =          # Logitech USB Keyboard
mouse_device =             # Logitech USB Optical Mouse
game_mode = true    # 启用游戏模式（吸附功能）

[relay]
# 转发模式配置
absolute_mode = true    # true=绝对定位, false=相对定位
auto_fire = false      # 自动开火模式

[keys]
# 按键映射（可自定义）
key_legit = F1         # Legit预设
key_semirage = F2      # Semi-rage预设
key_rage = F3          # Rage预设
key_autofire = F4      # 自动开枪开关
key_mode = F5          # 切换绝对/相对模式
key_sens_up = F6       # 增加灵敏度
key_sens_down = F7     # 降低灵敏度
key_game_mode = F9     # 游戏模式开关

[preset_legit]
# Legit预设参数（极端版 - 快速测试）
stiffness = 50.0
damping = 0.5
max_speed = 50000.0
micro_jitter = 0.0
overshoot_ratio = 0.0
close_strength = 3.0
mid_strength = 3.0
far_strength = 3.0
fire_delay_frames = 5

[preset_semirage]
# Semi-rage预设参数（平衡）
stiffness = 8.0
damping = 2.5
max_speed = 12000.0
micro_jitter = 0.8
overshoot_ratio = 0.06
close_strength = 1.0
mid_strength = 0.6
far_strength = 0.25
fire_delay_frames = 3

[preset_rage]
# Rage预设参数（激进）
stiffness = 15.0
damping = 1.5
max_speed = 20000.0
micro_jitter = 0.3
overshoot_ratio = 0.02
close_strength = 1.0
mid_strength = 0.9
far_strength = 0.6
fire_delay_frames = 1

[preset_custom]
# 自定义预设参数（可根据需要修改）
stiffness = 10.0
damping = 2.0
max_speed = 15000.0
micro_jitter = 0.5
overshoot_ratio = 0.04
close_strength = 0.85
mid_strength = 0.7
far_strength = 0.4
fire_delay_frames = 2
